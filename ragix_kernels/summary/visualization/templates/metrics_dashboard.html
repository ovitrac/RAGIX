<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ title }}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; }
header { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 1.25rem; font-weight: 600; }
header .meta { font-size: 0.8rem; opacity: 0.85; margin-left: auto; }
.dashboard { max-width: 1200px; margin: 0 auto; padding: 24px; }
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 24px; }
.kpi { background: #fff; border-radius: 8px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
.kpi .value { font-size: 1.5rem; font-weight: 700; }
.kpi .label { font-size: 0.68rem; text-transform: uppercase; color: #888; margin-top: 2px; }
.kpi.good .value { color: #2e7d32; }
.kpi.warn .value { color: #e65100; }
.kpi.info .value { color: #1565c0; }
.kpi.neutral .value { color: #333; }
.section { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
.section h2 { font-size: 1rem; font-weight: 600; color: #1a237e; margin-bottom: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #e0e0e0; font-size: 0.72rem; text-transform: uppercase; color: #666; }
td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
tr:hover { background: #f5f5f5; }
.bar-inline { display: inline-block; height: 8px; border-radius: 4px; vertical-align: middle; }
.donut-container { width: 180px; height: 180px; margin: 0 auto; }
</style>
</head>
<body>

<header>
  <h1>{{ title }}</h1>
  <span class="meta">Smart Metrics Dashboard</span>
</header>

<div class="dashboard">
  <!-- Top KPIs -->
  <div class="kpi-row" id="kpi-row"></div>

  <div class="grid-2">
    <!-- Tier distribution donut -->
    <div class="section">
      <h2>Tier Distribution</h2>
      <div class="donut-container"><svg id="tier-donut" width="180" height="180"></svg></div>
      <div id="tier-legend" style="text-align:center;margin-top:8px;font-size:0.75rem;"></div>
    </div>
    <!-- Type distribution donut -->
    <div class="section">
      <h2>Type Distribution</h2>
      <div class="donut-container"><svg id="type-donut" width="180" height="180"></svg></div>
      <div id="type-legend" style="text-align:center;margin-top:8px;font-size:0.75rem;"></div>
    </div>
  </div>

  <!-- Domain health table -->
  <div class="section">
    <h2>Domain Health</h2>
    <table>
      <thead>
        <tr>
          <th>Domain</th>
          <th>Items</th>
          <th>LTM</th>
          <th>Stability</th>
          <th>Verified</th>
          <th>Avg Conf</th>
          <th>Avg Usage</th>
          <th>Entities/Item</th>
        </tr>
      </thead>
      <tbody id="domain-tbody"></tbody>
    </table>
  </div>

  <!-- Graph centrality -->
  <div class="section">
    <h2>Top Central Nodes (Degree Centrality)</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Label</th>
          <th>Degree</th>
          <th>Relative</th>
        </tr>
      </thead>
      <tbody id="centrality-tbody"></tbody>
    </table>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const metricsData = {{ metrics_data_json }};
const summary = metricsData.summary || {};
const perDomain = metricsData.per_domain || [];
const centrality = metricsData.centrality || [];
const tierDist = metricsData.tier_distribution || {};
const typeDist = metricsData.type_distribution || {};

// KPI cards
const kpiRow = document.getElementById('kpi-row');
[
  { label: 'Total Items', value: summary.total_items || 0, cls: 'info' },
  { label: 'Domains', value: summary.total_domains || 0, cls: 'info' },
  { label: 'LTM Ratio', value: (summary.ltm_ratio || 0) + '%', cls: summary.ltm_ratio > 30 ? 'good' : 'warn' },
  { label: 'Verified', value: (summary.verified_ratio || 0) + '%', cls: summary.verified_ratio > 50 ? 'good' : 'warn' },
  { label: 'Avg Confidence', value: ((summary.avg_confidence || 0) * 100).toFixed(0) + '%', cls: 'neutral' },
  { label: 'Entity Coverage', value: (summary.entity_coverage_pct || 0) + '%', cls: summary.entity_coverage_pct > 60 ? 'good' : 'warn' },
  { label: 'Graph Nodes', value: summary.graph_nodes || 0, cls: 'info' },
  { label: 'Graph Edges', value: summary.graph_edges || 0, cls: 'info' },
  { label: 'Graph Orphans', value: summary.graph_orphans || 0, cls: summary.graph_orphans > 0 ? 'warn' : 'good' },
  { label: 'Merges', value: summary.merge_count || 0, cls: 'neutral' },
].forEach(k => {
  const div = document.createElement('div');
  div.className = `kpi ${k.cls}`;
  div.innerHTML = `<div class="value">${k.value}</div><div class="label">${k.label}</div>`;
  kpiRow.appendChild(div);
});

// Donut chart helper
function drawDonut(svgId, legendId, data, colors) {
  const entries = Object.entries(data).filter(([k,v]) => v > 0);
  if (!entries.length) return;
  const total = entries.reduce((s, [k,v]) => s + v, 0);
  const svg = d3.select('#' + svgId);
  const g = svg.append('g').attr('transform', 'translate(90,90)');
  const arc = d3.arc().innerRadius(45).outerRadius(80);
  const pie = d3.pie().value(d => d[1]).sort(null);
  const color = d3.scaleOrdinal().domain(entries.map(e => e[0])).range(colors);

  g.selectAll('path').data(pie(entries)).join('path')
    .attr('d', arc)
    .attr('fill', d => color(d.data[0]))
    .attr('stroke', '#fff').attr('stroke-width', 2);

  // Center total
  g.append('text').attr('text-anchor', 'middle').attr('dy', '0.35em')
    .attr('font-size', '18px').attr('font-weight', '700').attr('fill', '#333')
    .text(total);

  // Legend
  const legend = document.getElementById(legendId);
  entries.forEach(([k, v]) => {
    const pct = (v / total * 100).toFixed(0);
    legend.innerHTML += `<span style="display:inline-block;margin:2px 6px;">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color(k)};vertical-align:middle;"></span>
      ${k.toUpperCase()} (${v}, ${pct}%)
    </span>`;
  });
}

drawDonut('tier-donut', 'tier-legend', tierDist, ['#ff9800', '#42a5f5', '#4caf50', '#9e9e9e']);
drawDonut('type-donut', 'type-legend', typeDist, d3.schemeTableau10);

// Domain health table
const domainTbody = document.getElementById('domain-tbody');
perDomain.forEach(d => {
  const stabColor = d.stability_pct > 50 ? '#4caf50' : d.stability_pct > 20 ? '#ff9800' : '#ef5350';
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><strong>${d.domain}</strong></td>
    <td>${d.count}</td>
    <td>${d.ltm}</td>
    <td>
      <span class="bar-inline" style="width:${Math.min(d.stability_pct, 100)}px;background:${stabColor};"></span>
      ${d.stability_pct}%
    </td>
    <td>${d.verified}</td>
    <td>${(d.avg_confidence * 100).toFixed(0)}%</td>
    <td>${d.avg_usage}</td>
    <td>${d.entity_density}</td>
  `;
  domainTbody.appendChild(tr);
});

// Centrality table
const centralTbody = document.getElementById('centrality-tbody');
const maxDegree = centrality.length > 0 ? centrality[0].degree : 1;
centrality.forEach((c, i) => {
  const pct = (c.degree / maxDegree * 100).toFixed(0);
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${i + 1}</td>
    <td>${c.label.substring(0, 50)}</td>
    <td>${c.degree}</td>
    <td>
      <span class="bar-inline" style="width:${pct}px;background:#1a237e;"></span>
      ${pct}%
    </td>
  `;
  centralTbody.appendChild(tr);
});
</script>
</body>
</html>
