<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ title }}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; }
header { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 1.25rem; font-weight: 600; }
header .stats { font-size: 0.8rem; opacity: 0.85; margin-left: auto; }
#item-count { background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; }

/* Search bar */
.search-bar { display: flex; gap: 12px; padding: 14px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; align-items: center; }
.search-bar .search-input-wrap { position: relative; flex: 1; min-width: 260px; }
.search-bar .search-input-wrap input { width: 100%; padding: 8px 12px 8px 36px; border: 2px solid #c5cae9; border-radius: 6px; font-size: 0.9rem; transition: border-color 0.2s; }
.search-bar .search-input-wrap input:focus { outline: none; border-color: #3f51b5; }
.search-bar .search-input-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9e9e9e; font-size: 1rem; pointer-events: none; }
.search-bar select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; }
.search-bar label { font-size: 0.8rem; font-weight: 500; }
.search-bar .match-count { font-size: 0.8rem; color: #666; margin-left: auto; white-space: nowrap; }

/* KPI cards */
.kpi-row { display: flex; gap: 12px; padding: 10px 24px; background: #fafbfc; border-bottom: 1px solid #eee; flex-wrap: wrap; }
.kpi-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 16px; min-width: 100px; text-align: center; }
.kpi-card .kpi-value { font-size: 1.3rem; font-weight: 700; color: #1a237e; }
.kpi-card .kpi-label { font-size: 0.65rem; text-transform: uppercase; color: #888; font-weight: 600; }

/* Layout */
.layout { display: flex; height: calc(100vh - 200px); }
.table-panel { flex: 1; overflow: auto; padding: 0; }
.detail-panel { width: 380px; background: #fff; border-left: 1px solid #e0e0e0; overflow-y: auto; padding: 16px; display: none; }
.detail-panel.active { display: block; }
.detail-panel h2 { font-size: 1rem; margin-bottom: 12px; color: #1a237e; }
.detail-panel .field { margin-bottom: 10px; }
.detail-panel .field-label { font-size: 0.7rem; text-transform: uppercase; color: #888; font-weight: 600; margin-bottom: 2px; }
.detail-panel .field-value { font-size: 0.85rem; word-break: break-word; }
.detail-panel .tags { display: flex; flex-wrap: wrap; gap: 4px; }
.detail-panel .tag { background: #e3f2fd; color: #1565c0; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
.detail-panel .entity-tag { background: #fce4ec; color: #c62828; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
.detail-panel .content-box { background: #f9f9f9; padding: 10px; border-radius: 4px; font-size: 0.8rem; max-height: 320px; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
thead { position: sticky; top: 0; background: #f5f7fa; z-index: 2; }
th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #e0e0e0; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; color: #666; cursor: pointer; white-space: nowrap; user-select: none; }
th:hover { color: #1a237e; }
th .arrow { font-size: 0.6rem; margin-left: 3px; }
td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
tr { cursor: pointer; }
tr:hover { background: #e8eaf6; }
tr.selected { background: #c5cae9; }
.empty-state { text-align: center; padding: 60px 20px; color: #999; font-size: 1rem; }

/* Badges */
.tier-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
.tier-stm { background: #fff3e0; color: #e65100; }
.tier-mtm { background: #e3f2fd; color: #1565c0; }
.tier-ltm { background: #e8f5e9; color: #2e7d32; }
.type-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 0.65rem; background: #f3e5f5; color: #6a1b9a; }
.score-bar { display: inline-block; width: 50px; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; vertical-align: middle; margin-right: 4px; }
.score-fill { height: 100%; border-radius: 3px; }
mark { background: #fff176; padding: 0 1px; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>{{ title }}</h1>
  <span id="item-count"></span>
  <span class="stats">{{ metadata.get('total', 0) }} items loaded</span>
</header>

<div class="search-bar">
  <div class="search-input-wrap">
    <span class="icon">&#128269;</span>
    <input type="text" id="search-input" placeholder="Search title, content, tags, entities..." autofocus>
  </div>
  <label>Domain <select id="filter-domain"><option value="">All</option></select></label>
  <label>Tier <select id="filter-tier"><option value="">All</option></select></label>
  <label>Type <select id="filter-type"><option value="">All</option></select></label>
  <label>Validation <select id="filter-validation"><option value="">All</option><option value="verified">Verified</option><option value="unverified">Unverified</option><option value="quarantined">Quarantined</option></select></label>
  <span class="match-count" id="match-count"></span>
</div>

<div class="kpi-row" id="kpi-row">
  <div class="kpi-card"><div class="kpi-value" id="kpi-total">0</div><div class="kpi-label">Total</div></div>
  <div class="kpi-card"><div class="kpi-value" id="kpi-matching">0</div><div class="kpi-label">Matching</div></div>
  <div class="kpi-card"><div class="kpi-value" id="kpi-domains">0</div><div class="kpi-label">Domains</div></div>
  <div class="kpi-card"><div class="kpi-value" id="kpi-ltm">0%</div><div class="kpi-label">LTM</div></div>
  <div class="kpi-card"><div class="kpi-value" id="kpi-verified">0%</div><div class="kpi-label">Verified</div></div>
</div>

<div class="layout">
  <div class="table-panel">
    <table id="results-table">
      <thead>
        <tr>
          <th data-col="score" style="width:90px;">Score <span class="arrow"></span></th>
          <th data-col="title">Title <span class="arrow"></span></th>
          <th data-col="tier" style="width:60px;">Tier <span class="arrow"></span></th>
          <th data-col="type" style="width:110px;">Type <span class="arrow"></span></th>
          <th data-col="domain" style="width:130px;">Domain <span class="arrow"></span></th>
          <th data-col="tags">Tags</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
  <div class="detail-panel" id="detail-panel">
    <h2 id="detail-title"></h2>
    <div class="field"><div class="field-label">ID</div><div class="field-value" id="detail-id"></div></div>
    <div class="field"><div class="field-label">Tier</div><div class="field-value" id="detail-tier"></div></div>
    <div class="field"><div class="field-label">Type</div><div class="field-value" id="detail-type"></div></div>
    <div class="field"><div class="field-label">Domain</div><div class="field-value" id="detail-domain"></div></div>
    <div class="field"><div class="field-label">Scope</div><div class="field-value" id="detail-scope"></div></div>
    <div class="field"><div class="field-label">Corpus</div><div class="field-value" id="detail-corpus"></div></div>
    <div class="field"><div class="field-label">Source</div><div class="field-value" id="detail-source"></div></div>
    <div class="field"><div class="field-label">Confidence</div><div class="field-value" id="detail-confidence"></div></div>
    <div class="field"><div class="field-label">Validation</div><div class="field-value" id="detail-validation"></div></div>
    <div class="field"><div class="field-label">Tags</div><div class="field-value tags" id="detail-tags"></div></div>
    <div class="field"><div class="field-label">Entities</div><div class="field-value tags" id="detail-entities"></div></div>
    <div class="field"><div class="field-label">Content</div><div class="field-value content-box" id="detail-content"></div></div>
    <div class="field"><div class="field-label">Created</div><div class="field-value" id="detail-created"></div></div>
    <div class="field"><div class="field-label">Updated</div><div class="field-value" id="detail-updated"></div></div>
  </div>
</div>

<script>
const queryData = {{ query_data_json }};
const allItems = queryData.items || [];
const meta = queryData.metadata || {};

// Populate filter dropdowns
const domainSel = document.getElementById('filter-domain');
const tierSel = document.getElementById('filter-tier');
const typeSel = document.getElementById('filter-type');

(meta.domains || []).forEach(d => {
  const o = document.createElement('option');
  o.value = d; o.textContent = d;
  domainSel.appendChild(o);
});
[...new Set(allItems.map(i => i.tier))].sort().forEach(t => {
  const o = document.createElement('option');
  o.value = t; o.textContent = t.toUpperCase();
  tierSel.appendChild(o);
});
[...new Set(allItems.map(i => i.type))].sort().forEach(t => {
  const o = document.createElement('option');
  o.value = t; o.textContent = t;
  typeSel.appendChild(o);
});

// KPI base values
document.getElementById('kpi-total').textContent = allItems.length;
document.getElementById('kpi-domains').textContent = (meta.domains || []).length;

// Sort state
let sortCol = 'score';
let sortAsc = false;
let selectedIdx = -1;
let debounceTimer = null;

function scoreItem(item, terms) {
  if (!terms.length) return 1.0;
  const haystack = [
    item.title || '',
    item.content || '',
    (item.tags || []).join(' '),
    (item.entities || []).join(' '),
  ].join(' ').toLowerCase();
  let hits = 0;
  for (const t of terms) {
    if (haystack.indexOf(t) !== -1) hits++;
  }
  return hits / terms.length;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightTerms(text, terms) {
  if (!terms.length || !text) return escapeHtml(text);
  let result = escapeHtml(text);
  for (const t of terms) {
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const terms = q ? q.split(/\s+/) : [];
  const domain = domainSel.value;
  const tier = tierSel.value;
  const type = typeSel.value;
  const validation = document.getElementById('filter-validation').value;

  let results = [];
  for (const item of allItems) {
    if (domain && item.domain !== domain) continue;
    if (tier && item.tier !== tier) continue;
    if (type && item.type !== type) continue;
    if (validation && item.validation !== validation) continue;

    const score = scoreItem(item, terms);
    if (terms.length && score === 0) continue;

    results.push({ item, score, _terms: terms });
  }

  // Sort
  results.sort((a, b) => {
    let va, vb;
    if (sortCol === 'score') { va = a.score; vb = b.score; }
    else { va = a.item[sortCol]; vb = b.item[sortCol]; }
    if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
    va = String(va || '').toLowerCase();
    vb = String(vb || '').toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  return results;
}

function tierBadge(tier) {
  const cls = tier === 'stm' ? 'tier-stm' : tier === 'mtm' ? 'tier-mtm' : 'tier-ltm';
  return '<span class="tier-badge ' + cls + '">' + (tier || '').toUpperCase() + '</span>';
}

function scoreColor(s) {
  if (s >= 0.8) return '#4caf50';
  if (s >= 0.5) return '#ff9800';
  if (s > 0) return '#f44336';
  return '#bdbdbd';
}

function renderTable() {
  const results = getFiltered();
  const terms = results.length > 0 ? results[0]._terms : [];
  const tbody = document.getElementById('results-body');

  // KPI updates
  document.getElementById('kpi-matching').textContent = results.length;
  document.getElementById('item-count').textContent = results.length + ' / ' + allItems.length;
  document.getElementById('match-count').textContent = results.length + ' matches';

  // LTM %
  const ltmCount = results.filter(r => r.item.tier === 'ltm').length;
  document.getElementById('kpi-ltm').textContent = results.length ? Math.round(ltmCount / results.length * 100) + '%' : '0%';

  // Verified %
  const verCount = results.filter(r => r.item.validation === 'verified').length;
  document.getElementById('kpi-verified').textContent = results.length ? Math.round(verCount / results.length * 100) + '%' : '0%';

  if (results.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No items match. Try different search terms or filters.</td></tr>';
    return;
  }

  tbody.innerHTML = results.map((r, i) => {
    const it = r.item;
    const pct = Math.round(r.score * 100);
    const title = highlightTerms((it.title || '').substring(0, 65), terms);
    const titleSuffix = (it.title || '').length > 65 ? '\u2026' : '';
    return '<tr data-idx="' + i + '"' + (selectedIdx === i ? ' class="selected"' : '') + '>' +
      '<td><span class="score-bar"><span class="score-fill" style="width:' + pct + '%;background:' + scoreColor(r.score) + '"></span></span> ' + pct + '%</td>' +
      '<td>' + title + titleSuffix + '</td>' +
      '<td>' + tierBadge(it.tier) + '</td>' +
      '<td><span class="type-badge">' + (it.type || '') + '</span></td>' +
      '<td>' + (it.domain || '') + '</td>' +
      '<td>' + (it.tags || []).slice(0, 3).map(function(t){ return '<span class="tag" style="display:inline-block;background:#e3f2fd;color:#1565c0;padding:1px 6px;border-radius:8px;font-size:0.65rem;">' + escapeHtml(t) + '</span>'; }).join(' ') + ((it.tags || []).length > 3 ? ' \u2026' : '') + '</td>' +
      '</tr>';
  }).join('');

  tbody.querySelectorAll('tr[data-idx]').forEach(function(tr) {
    tr.addEventListener('click', function() {
      var idx = parseInt(tr.dataset.idx);
      showDetail(results[idx], idx);
    });
  });
}

function showDetail(r, idx) {
  selectedIdx = idx;
  var it = r.item;
  var panel = document.getElementById('detail-panel');
  panel.classList.add('active');
  document.getElementById('detail-title').textContent = it.title || '';
  document.getElementById('detail-id').textContent = it.id || '';
  document.getElementById('detail-tier').innerHTML = tierBadge(it.tier);
  document.getElementById('detail-type').textContent = it.type || '';
  document.getElementById('detail-domain').textContent = it.domain || '\u2014';
  document.getElementById('detail-scope').textContent = it.scope || '';
  document.getElementById('detail-corpus').textContent = it.corpus_id || '\u2014';
  document.getElementById('detail-source').textContent = it.source_id || '\u2014';
  document.getElementById('detail-confidence').textContent = ((it.confidence || 0) * 100).toFixed(1) + '%';
  document.getElementById('detail-validation').textContent = it.validation || '';
  document.getElementById('detail-tags').innerHTML = (it.tags || []).map(function(t){ return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join('');
  document.getElementById('detail-entities').innerHTML = (it.entities || []).map(function(e){ return '<span class="entity-tag">' + escapeHtml(e) + '</span>'; }).join('');
  document.getElementById('detail-content').innerHTML = highlightTerms(it.content || '', r._terms);
  document.getElementById('detail-created').textContent = it.created_at || '';
  document.getElementById('detail-updated').textContent = it.updated_at || '';
  renderTable();
}

// Sort headers
document.querySelectorAll('th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = (col === 'score') ? false : true; }
    document.querySelectorAll('th .arrow').forEach(function(a){ a.textContent = ''; });
    th.querySelector('.arrow').textContent = sortAsc ? '\u25B2' : '\u25BC';
    renderTable();
  });
});

// Filter events with debounce on search
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderTable, 200);
});
domainSel.addEventListener('change', renderTable);
tierSel.addEventListener('change', renderTable);
typeSel.addEventListener('change', renderTable);
document.getElementById('filter-validation').addEventListener('change', renderTable);

// Initial render
renderTable();
</script>
</body>
</html>
